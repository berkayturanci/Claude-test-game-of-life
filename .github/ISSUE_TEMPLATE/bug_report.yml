name: Bug report
description: Report a problem with the Game of Life app.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: "Example: iOS Safari on iPhone 14, Chrome on macOS"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Screenshots, recordings, console errors, or related PRs.
