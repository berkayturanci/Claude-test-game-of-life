name: Feature request
description: Suggest an improvement or new workflow for the app.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user need should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the interaction, UI, or behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Simulation rules or patterns
        - Canvas rendering
        - Mouse, touch, or keyboard controls
        - Layout or visual design
        - Performance
        - GitHub workflow or documentation
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Suggested validation
      description: How should agents or maintainers test this?
